<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WICHAI.AGRI-TRADE - Export Ops Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'IBM Plex Sans Thai', sans-serif; background-color: #F9FAFB; }
        .modal-enter { animation: modalFadeIn 0.2s ease-out forwards; }
        @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="text-gray-800 antialiased h-screen flex flex-col">

    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between h-16">
            <div class="flex items-center">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-lg bg-emerald-600 text-white flex items-center justify-center font-bold">WA</div>
                    <span class="font-bold text-lg text-gray-900 tracking-tight">WICHAI.AGRI-TRADE CO.,LTD</span>
                </div>
                <div class="ml-10 flex space-x-8">
                    <button onclick="switchView('dashboard')" id="nav-dashboard" class="nav-btn border-emerald-500 text-gray-900 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium transition-colors">Master Logistics</button>
                    <button onclick="switchView('calendar')" id="nav-calendar" class="nav-btn border-transparent text-gray-500 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium transition-colors">Stuffing Calendar</button>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <span class="text-xs font-semibold text-emerald-700 bg-emerald-50 px-2 py-1 rounded-md border border-emerald-200">Export Ops Team</span>
                <span class="h-8 w-8 rounded-full bg-gray-100 flex items-center justify-center text-sm font-medium text-gray-600 border border-gray-200">JD</span>
            </div>
        </div>
    </nav>

    <main class="flex-1 overflow-y-auto p-8">
        <div id="view-dashboard" class="max-w-7xl mx-auto space-y-6">
            
            <div class="grid grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
                    <p class="text-sm font-medium text-gray-500">Total Executed Shipments</p>
                    <p class="text-3xl font-bold text-gray-900 mt-2">142</p>
                </div>
                <div class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
                    <p class="text-sm font-medium text-gray-500">Active Containers</p>
                    <p class="text-3xl font-bold text-gray-900 mt-2">35 <span class="text-sm font-normal text-gray-400">Containers</span></p>
                    <div class="mt-2 flex gap-4 text-xs font-semibold">
                        <span class="bg-emerald-50 text-emerald-700 px-2 py-1 rounded">20x 20'</span>
                        <span class="bg-blue-50 text-blue-700 px-2 py-1 rounded">15x 40'</span>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
                    <p class="text-sm font-medium text-gray-500">Total Export Volume (MT)</p>
                    <p class="text-3xl font-bold text-gray-900 mt-2">2,650 MT</p>
                </div>
            </div>

            <!-- SVG WORLD MAP -->
            <div class="bg-slate-950 p-6 rounded-xl border border-slate-800 shadow-xl">
                <h2 class="text-sm font-bold text-slate-400 mb-4 uppercase tracking-wider">Global Export Movements</h2>
                <div class="relative">
                    <svg viewBox="0 0 1000 500" class="w-full fill-slate-800 stroke-slate-900">
                        <path d="M125 180c-5-5-2-10 2-15s10-5 15-2 10 5 10 10-5 10-15 10c-5 0-10-5-12-3zM250 150c-20-20-10-40 10-40s40 10 40 40-20 30-40 10zM500 150c20-20 40-10 40 10s-20 40-40 40-40-20-40-40 20-10 40-10z"/>
                        <!-- Hotspots -->
                        <g onmouseover="showTooltip(event, 'East Asia (China)', 20, 380)">
                            <circle cx="750" cy="200" r="10" class="animate-ping fill-emerald-500 opacity-75"/>
                            <circle cx="750" cy="200" r="5" class="fill-emerald-400"/>
                        </g>
                        <g onmouseover="showTooltip(event, 'Japan', 15, 357.75)">
                            <circle cx="820" cy="180" r="8" class="animate-ping fill-emerald-500 opacity-75"/>
                            <circle cx="820" cy="180" r="4" class="fill-emerald-400"/>
                        </g>
                        <g onmouseover="showTooltip(event, 'Europe (Netherlands)', 2, 38)">
                            <circle cx="480" cy="130" r="6" class="animate-ping fill-emerald-500 opacity-75"/>
                            <circle cx="480" cy="130" r="3" class="fill-emerald-400"/>
                        </g>
                    </svg>
                    <div id="map-tooltip" class="hidden absolute bg-black text-white text-[10px] p-2 rounded shadow-xl border border-slate-700 pointer-events-none"></div>
                </div>
            </div>

            <!-- FILTERS & TABLE -->
            <div class="flex gap-4 bg-white p-4 rounded-lg border border-gray-100 shadow-sm">
                <select class="text-sm border-gray-300 rounded-lg p-2 border"><option>All Customers</option></select>
                <select class="text-sm border-gray-300 rounded-lg p-2 border"><option>All Products</option></select>
                <select class="text-sm border-gray-300 rounded-lg p-2 border"><option>All Destinations</option></select>
            </div>

            <div class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Customer</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">PO</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">DI Number</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Product</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Logistics</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">ETD</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">ETA</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                            <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase">Action</th>
                        </tr>
                    </thead>
                    <tbody id="shipment-table-body" class="divide-y divide-gray-100"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const shipments = [
            { cust: 'AgriCorp China', po: 'PO-10492', di: 'DI-2023-8994', prod: 'THP', log: 'MSC EMMA / 20\'', etd: '12 Nov', eta: '25 Nov', status: 'Issue Logged', stuffing: '#', docs: '' },
            { cust: 'Global Feed', po: 'PO-10498', di: 'DI-2023-9005', prod: 'THP', log: 'CMA CGM / 40\'', etd: '15 Nov', eta: '28 Nov', status: 'In Progress', stuffing: '#', docs: '#' }
        ];

        function showTooltip(e, region, act, vol) {
            const tt = document.getElementById('map-tooltip');
            tt.innerText = `Region: ${region} | Active: ${act} Containers | Volume: ${vol} MT`;
            tt.style.left = (e.clientX + 10) + 'px'; tt.style.top = (e.clientY + 10) + 'px';
            tt.classList.remove('hidden');
        }
        window.onmousemove = (e) => {
            const tt = document.getElementById('map-tooltip');
            if(!tt.classList.contains('hidden')) { tt.style.left = (e.clientX + 10) + 'px'; tt.style.top = (e.clientY + 10) + 'px'; }
        }
        window.onmouseout = () => document.getElementById('map-tooltip').classList.add('hidden');

        function renderTable(data) {
            const body = document.getElementById('shipment-table-body');
            body.innerHTML = data.map(item => `
                <tr class="hover:bg-gray-50">
                    <td class="px-4 py-4 text-sm font-semibold">${item.cust}</td>
                    <td class="px-4 py-4 text-sm text-gray-500">${item.po}</td>
                    <td class="px-4 py-4 text-sm font-mono font-medium">${item.di}</td>
                    <td class="px-4 py-4 text-sm">${item.prod}</td>
                    <td class="px-4 py-4 text-sm">${item.log}</td>
                    <td class="px-4 py-4 text-sm text-gray-600">${item.etd}</td>
                    <td class="px-4 py-4 text-sm text-gray-600">${item.eta}</td>
                    <td class="px-4 py-4"><span class="px-2 py-1 text-xs font-semibold rounded-full ${item.status === 'Issue Logged' ? 'bg-red-100 text-red-800' : 'bg-blue-100 text-blue-800'}">${item.status}</span></td>
                    <td class="px-4 py-4 text-right flex justify-end gap-2">
                        <button class="px-2 py-1 ${item.stuffing ? 'bg-emerald-50 text-emerald-700' : 'bg-gray-50 text-gray-400'} border rounded text-[10px] font-bold">Stuffing Rep.</button>
                        <button class="px-2 py-1 ${item.docs ? 'bg-emerald-50 text-emerald-700' : 'bg-gray-50 text-gray-400'} border rounded text-[10px] font-bold">All Ship Doc</button>
                    </td>
                </tr>
            `).join('');
        }
        renderTable(shipments);
        function switchView(v) { /* ... */ }
    </script>
</body>
</html>
